<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IMO Meeting Rooms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #002b5c;
      color: white;
    }

    header {
      background: #001f44;
      padding: 30px;
      text-align: center;
    }

    h1 {
      font-size: 56px;
      margin: 0;
    }

    .subtitle {
      font-size: 28px;
      margin-top: 10px;
    }

    #feed {
      padding: 35px;
      padding-bottom: 90px;
    }

    .item {
      background: white;
      color: #002b5c;
      margin-bottom: 24px;
      padding: 28px;
      border-radius: 14px;
      font-size: 38px;
      font-weight: bold;
      line-height: 1.3;
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #001f44;
      text-align: center;
      padding: 15px;
      font-size: 22px;
    }

    .error {
      background: #ffdddd;
      color: #900;
      padding: 25px;
      border-radius: 12px;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <header>
    <h1>IMO Meeting Rooms</h1>
    <div class="subtitle">Rooms and locations for delegates</div>
  </header>

  <div id="feed">
    Loading meeting room information...
  </div>

  <div class="footer">
    Please check this screen regularly, as rooms may be subject to change.
  </div>

  <script>
    const rssUrl = "https://meetingroomsimo.github.io/MeetingroomsIMO/rss.xml";

    function loadRSS() {
      fetch(rssUrl + "?t=" + new Date().getTime())
        .then(response => {
          if (!response.ok) {
            throw new Error("RSS file not found");
          }
          return response.text();
        })
        .then(data => {
          const parser = new DOMParser();
          const xml = parser.parseFromString(data, "application/xml");

          const error = xml.querySelector("parsererror");
          if (error) {
            throw new Error("RSS file has an XML error");
          }

          const items = xml.querySelectorAll("item");
          const feed = document.getElementById("feed");

          feed.innerHTML = "";

          if (items.length === 0) {
            feed.innerHTML = "<div class='error'>No RSS items found.</div>";
            return;
          }

          items.forEach(item => {
            const title = item.querySelector("title").textContent;

            const div = document.createElement("div");
            div.className = "item";
            div.textContent = title;

            feed.appendChild(div);
          });
        })
        .catch(error => {
          document.getElementById("feed").innerHTML =
            "<div class='error'>Unable to load RSS feed. Please check rss.xml.</div>";
        });
    }

    loadRSS();

    setInterval(loadRSS, 300000);
  </script>

</body>
</html>
